apiVersion: oda.tmforum.org/v1
kind: Component
metadata:
  name: r1-productinventorymanagement
  labels:
    oda.tmforum.org/componentName: r1-productinventorymanagement
spec:
  componentMetadata:
    id: TMFC005
    name: productinventorymanagement
    functionalBlock: CoreCommerce
    publicationDate: "2026-04-09T00:00:00.000Z"
    status: specified
    version: "0.1.0"
    description: Reference TMFC005 Product Inventory Management component with TMF637 CRUD support for product inventory resources, metrics, role support, and optional MCP.
    maintainers:
      - name: TMFC005 Reference Authors
        email: oda-components@example.com
    owners:
      - name: TMFC005 Reference Authors
        email: oda-components@example.com
  coreFunction:
    exposedAPIs:
      - name: productinventorymanagement
        specification:
          - url: "https://raw.githubusercontent.com/tmforum-apis/TMF637_ProductInventory/main/TMF637-ProductInventory-v5.0.0.oas.yaml"
        implementation: r1-productinventoryapi
        apiType: openapi
        id: TMF637
        path: /r1-productinventorymanagement/tmf-api/productInventoryManagement/v5
        developerUI: /r1-productinventorymanagement/tmf-api/productInventoryManagement/v5/docs
        port: 8080
      - name: productinventorymcp
        specification:
          - url: "https://modelcontextprotocol.io/specification/"
        implementation: r1-productinventorymcp
        apiType: mcp
        path: /r1-productinventorymanagement/mcp
        port: 8080
    dependentAPIs: []
  eventNotification:
    publishedEvents:
      - name: ProductAttributeValueChangeEvent
      - name: ProductCreateEvent
      - name: ProductDeleteEvent
      - name: ProductProductBatchEvent
      - name: ProductStateChangeEvent
    subscribedEvents: []
  managementFunction:
    exposedAPIs:
      - name: metrics
        apiType: prometheus
        implementation: r1-productinventorymanagement-sm
        path: /r1-productinventorymanagement/metrics
        port: 4000
    dependentAPIs: []
  securityFunction:
    canvasSystemRole: ProductInventoryManagementAdmin
    exposedAPIs:
      - name: partyrole
        specification:
          - url: "https://raw.githubusercontent.com/tmforum-apis/TMF669_PartyRole/master/TMF669-PartyRole-v4.0.0.swagger.json"
        implementation: r1-partyroleapi
        apiType: openapi
        id: TMF669
        path: /r1-productinventorymanagement/tmf-api/partyRoleManagement/v4
        developerUI: /r1-productinventorymanagement/tmf-api/partyRoleManagement/v4/docs
        port: 8080
