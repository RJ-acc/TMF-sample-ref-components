apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-partyroleapi
  labels:
    oda.tmforum.org/componentName: {{ .Release.Name }}-{{ .Values.component.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      impl: {{ .Release.Name }}-partyroleapi
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-{{ .Values.component.name }}
        impl: {{ .Release.Name }}-partyroleapi
        version: {{ .Values.partyrole.versionLabel }}
    spec:
      containers:
        - name: {{ .Release.Name }}-partyroleapi
          image: {{ .Values.partyrole.image }}
          env:
            - name: RELEASE_NAME
              value: {{ .Release.Name }}
            - name: COMPONENT_NAME
              value: {{ .Release.Name }}-{{ .Values.component.name }}
            - name: API_BASE_PATH
              value: /{{ .Release.Name }}-{{ .Values.component.name }}/tmf-api/partyRoleManagement/v4
            - name: MONGODB_HOST
              value: {{ .Release.Name }}-mongodb
            - name: MONGODB_PORT
              value: {{ .Values.mongodb.port | quote }}
            - name: MONGODB_DATABASE
              value: {{ .Values.mongodb.database }}
            - name: NODE_ENV
              value: production
          imagePullPolicy: IfNotPresent
          ports:
            - name: {{ .Release.Name }}-prapi
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /{{ .Release.Name }}-{{ .Values.component.name }}/tmf-api/partyRoleManagement/v4/partyRole
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20

