# Default values for billgenerationmanagement.

component:
  id: TMFC030
  name: billgenerationmanagement
  functionalBlock: CoreCommerce
  publicationDate: 2026-04-08T00:00:00.000Z
  version: "0.4.1"
  apiVersion: v5
  specificationUrl: https://raw.githubusercontent.com/tmforum-apis/TMF678_CustomerBill/main/TMF678-CustomerBill-v5.0.0.oas.yaml
  storageClassName: ""
  apipolicy:
    apiKeyVerification:
      enabled: false
      location: header
    rateLimit:
      enabled: false
      identifier: IP
      limit: "6"
      interval: pm
    quota:
      identifier: ""
      limit: ""
    OASValidation:
      requestEnabled: false
      responseEnabled: false
      allowUnspecifiedHeaders: false
      allowUnspecifiedQueryParams: false
      allowUnspecifiedCookies: false
    CORS:
      enabled: false
      allowCredentials: false
      allowOrigins: "https://allowed-origin.com, https://allowed-origin2.com"
      handlePreflightRequests:
        enabled: false
        allowHeaders: "Accept, X-Requested-With, Content-Type, Access-Control-Request-Method, Access-Control-Request-Headers"
        allowMethods: "GET, POST, PATCH, DELETE"
        maxAge: 36000
    template: ""
  dependentAPIs:
    enabled: false
  eventNotification:
    publishedEvents:
      - CustomerBillCreateEvent
      - CustomerBillStateChangeEvent
      - CustomerBillOnDemandCreateEvent
      - CustomerBillOnDemandStateChangeEvent
    subscribedEvents: []
  MCPServer:
    enabled: true

security:
  canvasSystemRole: BillGenerationManagementAdmin

service:
  type: NodePort

mongodb:
  image: mongo:7
  port: 27017
  database: tmfc030
  storage: 5Gi

api:
  image: ravijangra92/tmf678:bill-generation-api-0.1.0
  versionLabel: bill-generation-api-0.1.0

