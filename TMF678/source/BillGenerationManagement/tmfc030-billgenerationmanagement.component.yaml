apiVersion: oda.tmforum.org/v1
kind: Component
metadata:
  name: r1-billgenerationmanagement
  labels:
    oda.tmforum.org/componentName: r1-billgenerationmanagement
spec:
  componentMetadata:
    id: TMFC030
    name: billgenerationmanagement
    functionalBlock: CoreCommerce
    publicationDate: "2026-04-08T00:00:00.000Z"
    status: specified
    version: "0.1.0"
    description: Reference TMFC030 Bill Generation Management component with TMF678 customer-bill retrieval, on-demand bill generation, customer bill patch support, metrics, role support, and optional MCP.
    maintainers:
      - name: TMFC030 Reference Authors
        email: oda-components@example.com
    owners:
      - name: TMFC030 Reference Authors
        email: oda-components@example.com
  coreFunction:
    exposedAPIs:
      - name: customerbillmanagement
        specification:
          - url: "https://raw.githubusercontent.com/tmforum-apis/TMF678_CustomerBill/main/TMF678-CustomerBill-v5.0.0.oas.yaml"
        implementation: r1-billgenapi
        apiType: openapi
        id: TMF678
        path: /r1-billgenerationmanagement/tmf-api/customerBillManagement/v5
        developerUI: /r1-billgenerationmanagement/tmf-api/customerBillManagement/v5/docs
        port: 8080
    dependentAPIs: []
  eventNotification:
    publishedEvents:
      - name: CustomerBillCreateEvent
      - name: CustomerBillStateChangeEvent
      - name: CustomerBillOnDemandCreateEvent
      - name: CustomerBillOnDemandStateChangeEvent
    subscribedEvents: []
  managementFunction:
    exposedAPIs:
      - name: metrics
        apiType: prometheus
        implementation: r1-billgenerationmanagement-sm
        path: /r1-billgenerationmanagement/metrics
        port: 4000
    dependentAPIs: []
  securityFunction:
    canvasSystemRole: BillGenerationManagementAdmin
    exposedAPIs:
      - name: partyrole
        specification:
          - url: "https://raw.githubusercontent.com/tmforum-apis/TMF669_PartyRole/master/TMF669-PartyRole-v4.0.0.swagger.json"
        implementation: r1-partyroleapi
        apiType: openapi
        id: TMF669
        path: /r1-billgenerationmanagement/tmf-api/partyRoleManagement/v4
        developerUI: /r1-billgenerationmanagement/tmf-api/partyRoleManagement/v4/docs
        port: 8080
