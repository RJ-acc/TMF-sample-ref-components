    id: TMFC024
    name: billingaccountmanagement
    functionalBlock: CoreCommerce
    publicationDate: "2026-04-08T00:00:00.000Z"
    status: specified
    version: "0.1.0"
    description: Reference TMFC024 Billing Account Management component with TMF666 CRUD support for billing accounts and related account-management resources, metrics, role support, and optional MCP.
    maintainers:
      - name: TMFC024 Reference Authors
        email: oda-components@example.com
