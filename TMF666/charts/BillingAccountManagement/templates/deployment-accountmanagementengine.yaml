apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-accountmanagementengine
  labels:
    oda.tmforum.org/componentName: {{ .Release.Name }}-{{ .Values.component.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      impl: {{ .Release.Name }}-accountmanagementengine
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-{{ .Values.component.name }}
        impl: {{ .Release.Name }}-accountmanagementengine
        version: {{ .Values.engine.versionLabel }}
    spec:
      containers:
        - name: {{ .Release.Name }}-accountmanagementengine
          image: {{ .Values.engine.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: {{ .Release.Name }}-ameng
              containerPort: 8081
          startupProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
