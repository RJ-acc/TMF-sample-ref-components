apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-troubleticketmanagementinitialization
  labels:
    oda.tmforum.org/componentName: {{ .Release.Name }}-{{ .Values.component.name }}
spec:
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-troubleticketmanagementinitialization
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: {{ .Release.Name }}-troubleticketmanagementinitialization
          image: {{ .Values.troubleticketmanagementinitialization.image }}
          env:
            - name: RELEASE_NAME
              value: {{ .Release.Name }}
            - name: COMPONENT_NAME
              value: {{ .Release.Name }}-{{ .Values.component.name }}
            - name: TROUBLE_TICKET_API_BASE_URL
              value: http://{{ .Release.Name }}-troubleticketmanagementapi:8080/{{ .Release.Name }}-{{ .Values.component.name }}/tmf-api/troubleTicket/{{ .Values.component.apiVersion }}
            - name: METRICS_CALLBACK_URL
              value: http://{{ .Release.Name }}-{{ .Values.component.name }}-sm:4000/listener/troubleTicketEvent
          imagePullPolicy: IfNotPresent
  backoffLimit: 10
