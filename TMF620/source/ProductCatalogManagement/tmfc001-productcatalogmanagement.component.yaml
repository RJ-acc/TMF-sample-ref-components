apiVersion: oda.tmforum.org/v1
kind: Component
metadata:
  name: r1-productcatalogmanagement
  labels:
    oda.tmforum.org/componentName: r1-productcatalogmanagement
spec:
  componentMetadata:
    id: TMFC001
    name: productcatalogmanagement
    functionalBlock: CoreCommerce
    publicationDate: "2026-04-09T00:00:00.000Z"
    status: specified
    version: "0.1.0"
    description: Reference TMFC001 Product Catalog Management component with TMF620 CRUD support for catalog resources, task support for import and export jobs, metrics, role support, and optional MCP.
    maintainers:
      - name: TMFC001 Reference Authors
        email: oda-components@example.com
    owners:
      - name: TMFC001 Reference Authors
        email: oda-components@example.com
  coreFunction:
    exposedAPIs:
      - name: productcatalogmanagement
        specification:
          - url: "https://raw.githubusercontent.com/tmforum-apis/TMF620_ProductCatalog/main/TMF620-Product_Catalog_Management-v5.0.0.oas.yaml"
        implementation: r1-productcatalogapi
        apiType: openapi
        id: TMF620
        path: /r1-productcatalogmanagement/tmf-api/productCatalogManagement/v5
        developerUI: /r1-productcatalogmanagement/tmf-api/productCatalogManagement/v5/docs
        port: 8080
    dependentAPIs: []
  eventNotification:
    publishedEvents:
      - name: ProductCatalogAttributeValueChangeEvent
      - name: ProductCatalogCreateEvent
      - name: ProductCatalogDeleteEvent
      - name: ProductCatalogStateChangeEvent
      - name: CategoryAttributeValueChangeEvent
      - name: CategoryCreateEvent
      - name: CategoryDeleteEvent
      - name: CategoryStateChangeEvent
      - name: ProductOfferingAttributeValueChangeEvent
      - name: ProductOfferingCreateEvent
      - name: ProductOfferingDeleteEvent
      - name: ProductOfferingStateChangeEvent
      - name: ProductOfferingPriceAttributeValueChangeEvent
      - name: ProductOfferingPriceCreateEvent
      - name: ProductOfferingPriceDeleteEvent
      - name: ProductOfferingPriceStateChangeEvent
      - name: ProductSpecificationAttributeValueChangeEvent
      - name: ProductSpecificationCreateEvent
      - name: ProductSpecificationDeleteEvent
      - name: ProductSpecificationStateChangeEvent
      - name: ImportJobCreateEvent
      - name: ImportJobStateChangeEvent
      - name: ExportJobCreateEvent
      - name: ExportJobStateChangeEvent
    subscribedEvents: []
  managementFunction:
    exposedAPIs:
      - name: metrics
        apiType: prometheus
        implementation: r1-productcatalogmanagement-sm
        path: /r1-productcatalogmanagement/metrics
        port: 4000
    dependentAPIs: []
  securityFunction:
    canvasSystemRole: ProductCatalogManagementAdmin
    exposedAPIs:
      - name: partyrole
        specification:
          - url: "https://raw.githubusercontent.com/tmforum-apis/TMF669_PartyRole/master/TMF669-PartyRole-v4.0.0.swagger.json"
        implementation: r1-partyroleapi
        apiType: openapi
        id: TMF669
        path: /r1-productcatalogmanagement/tmf-api/partyRoleManagement/v4
        developerUI: /r1-productcatalogmanagement/tmf-api/partyRoleManagement/v4/docs
        port: 8080
