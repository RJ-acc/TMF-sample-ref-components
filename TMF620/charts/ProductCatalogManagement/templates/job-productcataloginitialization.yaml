apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-productcataloginitialization
  labels:
    oda.tmforum.org/componentName: {{ .Release.Name }}-{{ .Values.component.name }}
spec:
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-productcataloginitialization
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: {{ .Release.Name }}-productcataloginitialization
          image: {{ .Values.productcataloginitialization.image }}
          env:
            - name: RELEASE_NAME
              value: {{ .Release.Name }}
            - name: COMPONENT_NAME
              value: {{ .Release.Name }}-{{ .Values.component.name }}
            - name: CATALOG_API_BASE_URL
              value: http://{{ .Release.Name }}-productcatalogapi:8080/{{ .Release.Name }}-{{ .Values.component.name }}/tmf-api/productCatalogManagement/{{ .Values.component.apiVersion }}
            - name: METRICS_CALLBACK_URL
              value: http://{{ .Release.Name }}-{{ .Values.component.name }}-sm:4000/listener
          imagePullPolicy: Always
  backoffLimit: 10
