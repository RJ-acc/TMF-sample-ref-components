name: Release Helm Charts

on:
  pull_request:
    paths:
      - "TMF*/charts/**"
      - ".github/workflows/release-helm-charts.yml"
  push:
    branches:
      - main
    paths:
      - "TMF*/charts/**"
      - ".github/workflows/release-helm-charts.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: helm-charts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint Helm charts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint all charts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t chart_files < <(find . -name Chart.yaml | sort)

          if [ "${#chart_files[@]}" -eq 0 ]; then
            echo "No Helm charts were found."
            exit 1
          fi

          for chart_file in "${chart_files[@]}"; do
            chart_dir="$(dirname "$chart_file")"
            echo "::group::helm lint ${chart_dir}"
            helm lint "$chart_dir"
            echo "::endgroup::"
          done

  release:
    name: Publish Helm repository
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs:
      - lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Package all charts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .chart-packages
          mapfile -t chart_files < <(find . -name Chart.yaml | sort)

          for chart_file in "${chart_files[@]}"; do
            chart_dir="$(dirname "$chart_file")"
            echo "::group::helm package ${chart_dir}"
            helm package "$chart_dir" --destination .chart-packages
            echo "::endgroup::"
          done

      - name: Build chart repository
        shell: bash
        run: |
          set -euo pipefail

          repo_owner="${GITHUB_REPOSITORY_OWNER}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          pages_url="https://${repo_owner}.github.io/${repo_name}"
          publish_dir="${GITHUB_WORKSPACE}/.chart-repo"
          pages_dir="$(mktemp -d)"
          existing_index=""
          had_gh_pages_branch="false"

          cleanup() {
            git worktree remove "$pages_dir" --force 2>/dev/null || true
            rm -rf "$pages_dir"
            if [ -n "$existing_index" ] && [ -f "$existing_index" ]; then
              rm -f "$existing_index"
            fi
          }

          trap cleanup EXIT
          rm -rf "$publish_dir"
          mkdir -p "$publish_dir"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            had_gh_pages_branch="true"
            git fetch origin gh-pages:gh-pages
            git worktree add "$pages_dir" gh-pages
            find "$pages_dir" -maxdepth 1 -name '*.tgz' -exec cp {} "$publish_dir"/ \;
          else
            git worktree add --detach "$pages_dir"
            (
              cd "$pages_dir"
              git checkout --orphan gh-pages
              find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
            )
          fi

          for package in .chart-packages/*.tgz; do
            package_name="$(basename "$package")"
            target_package="$publish_dir/$package_name"

            if [ -f "$target_package" ] && ! cmp -s "$package" "$target_package"; then
              echo "Published package ${package_name} already exists with different contents."
              echo "Bump the chart version before releasing updated chart contents."
              exit 1
            fi

            cp "$package" "$target_package"
          done

          if [ -f "$pages_dir/index.yaml" ]; then
            existing_index="$(mktemp)"
            cp "$pages_dir/index.yaml" "$existing_index"
            helm repo index "$publish_dir" --url "$pages_url" --merge "$existing_index"
          else
            helm repo index "$publish_dir" --url "$pages_url"
          fi

          touch "$publish_dir/.nojekyll"
          printf '%s\n' \
            '# Helm Chart Repository' \
            '' \
            'This branch is generated by `.github/workflows/release-helm-charts.yml`' \
            'and serves the published Helm repository for this project.' \
            > "$publish_dir/README.md"

          if [ "$had_gh_pages_branch" = "true" ]; then
            find "$pages_dir" -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          fi
          cp -R "$publish_dir"/. "$pages_dir"/

          (
            cd "$pages_dir"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .

            if git diff --cached --quiet; then
              echo "No chart repository changes to publish."
              exit 0
            fi

            git commit -m "Publish Helm charts from ${GITHUB_SHA}"
            git push origin HEAD:gh-pages
          )

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .chart-repo

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs:
      - release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
