    dependentAPIs: []
  securityFunction:
    canvasSystemRole: SLAManagementAdmin
    exposedAPIs:
      - name: partyrole
        specification:
          - url: "https://raw.githubusercontent.com/tmforum-apis/TMF669_PartyRole/master/TMF669-PartyRole-v4.0.0.swagger.json"
        implementation: r1-partyroleapi
        apiType: openapi
        id: TMF669
        path: /r1-slamanagement/tmf-api/partyRoleManagement/v4
        developerUI: /r1-slamanagement/tmf-api/partyRoleManagement/v4/docs
        port: 8080
