apiVersion: oda.tmforum.org/v1
kind: Component
metadata:
  name: r1-slamanagement
  labels:
    oda.tmforum.org/componentName: r1-slamanagement
spec:
  componentMetadata:
    id: TMF623
    name: slamanagement
    functionalBlock: ServiceQualityManagement
    publicationDate: "2026-04-09T00:00:00.000Z"
    status: specified
    version: "0.2.0"
    description: Reference TMF623 SLA Management component with support for sla and slaViolation resources, metrics, role support, and optional MCP.
    maintainers:
      - name: TMF623 Reference Authors
        email: oda-components@example.com
    owners:
      - name: TMF623 Reference Authors
        email: oda-components@example.com
  coreFunction:
    exposedAPIs:
      - name: slamanagement
        specification:
          - url: "https://raw.githubusercontent.com/tmforum/TMFAPISWAGGER/develop/slaManagement/v2/swagger2.json"
