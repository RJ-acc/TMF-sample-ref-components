{{- $eventNotification := .Values.component.eventNotification | default (dict) }}
{{- $publishedEvents := get $eventNotification "publishedEvents" | default (list) }}
{{- $subscribedEvents := get $eventNotification "subscribedEvents" | default (list) }}
apiVersion: oda.tmforum.org/v1
kind: Component
metadata:
  name: {{ .Release.Name }}-{{ .Values.component.name }}
  labels:
    oda.tmforum.org/componentName: {{ .Release.Name }}-{{ .Values.component.name }}
spec:
  componentMetadata:
    id: {{ .Values.component.id }}
    name: {{ .Values.component.name }}
    functionalBlock: {{ .Values.component.functionalBlock }}
    publicationDate: {{ .Values.component.publicationDate | quote }}
    status: specified
    version: {{ .Values.component.version | quote }}
    description: "Reference TMF623 SLA Management component with support for sla and slaViolation resources, metrics, role support, and optional MCP."
    maintainers:
      - name: TMF623 Reference Authors
        email: oda-components@example.com
    owners:
      - name: TMF623 Reference Authors
        email: oda-components@example.com
  coreFunction:
    exposedAPIs:
      - name: slamanagement
        specification:
          - url: {{ .Values.component.specificationUrl | quote }}
        implementation: {{ .Release.Name }}-slamanagementapi
        apiType: openapi
        id: TMF623
        gatewayConfiguration:
          apiKeyVerification: {{ .Values.component.apipolicy.apiKeyVerification | toYaml | nindent 12 }}
          rateLimit: {{ .Values.component.apipolicy.rateLimit | toYaml | nindent 12 }}
          quota: {{ .Values.component.apipolicy.quota | toYaml | nindent 12 }}
          OASValidation: {{ .Values.component.apipolicy.OASValidation | toYaml | nindent 12 }}
          CORS: {{ .Values.component.apipolicy.CORS | toYaml | nindent 12 }}
          template: {{ .Values.component.apipolicy.template | quote }}
        path: /{{ .Release.Name }}-{{ .Values.component.name }}/tmf-api/slaManagement/{{ .Values.component.apiVersion }}
        developerUI: /{{ .Release.Name }}-{{ .Values.component.name }}/tmf-api/slaManagement/{{ .Values.component.apiVersion }}/docs
        port: 8080
      {{- if .Values.component.MCPServer.enabled }}
      - name: slamanagementmcp
        specification:
          - url: "https://modelcontextprotocol.io/specification/"
        implementation: {{ .Release.Name }}-slamanagementmcp
        apiType: mcp
        path: /{{ .Release.Name }}-{{ .Values.component.name }}/mcp
        port: 8080
      {{- end }}
    {{- if .Values.component.dependentAPIs.enabled }}
    dependentAPIs:
      - name: {{ .Values.component.dependentAPIs.partyManagement.name }}
        apiType: openapi
        id: TMF632
        specification:
          - url: {{ .Values.component.dependentAPIs.partyManagement.specificationUrl | quote }}
    {{- else }}
    dependentAPIs: []
    {{- end }}
  eventNotification:
    publishedEvents:{{ include "slamanagement.renderEventList" $publishedEvents | nindent 6 }}
    subscribedEvents:{{ include "slamanagement.renderEventList" $subscribedEvents | nindent 6 }}
  managementFunction:
    exposedAPIs:
      - name: metrics
        apiType: prometheus
        gatewayConfiguration:
          apiKeyVerification: {{ .Values.component.apipolicy.apiKeyVerification | toYaml | nindent 12 }}
          rateLimit: {{ .Values.component.apipolicy.rateLimit | toYaml | nindent 12 }}
          quota: {{ .Values.component.apipolicy.quota | toYaml | nindent 12 }}
          OASValidation: {{ .Values.component.apipolicy.OASValidation | toYaml | nindent 12 }}
          CORS: {{ .Values.component.apipolicy.CORS | toYaml | nindent 12 }}
          template: {{ .Values.component.apipolicy.template | quote }}
        implementation: {{ .Release.Name }}-{{ .Values.component.name }}-sm
        path: /{{ .Release.Name }}-{{ .Values.component.name }}/metrics
        port: 4000
    dependentAPIs: []
  securityFunction:
    canvasSystemRole: {{ .Values.security.canvasSystemRole }}
    exposedAPIs:
      - name: partyrole
        specification:
          - url: "https://raw.githubusercontent.com/tmforum-apis/TMF669_PartyRole/master/TMF669-PartyRole-v4.0.0.swagger.json"
        implementation: {{ .Release.Name }}-partyroleapi
        apiType: openapi
        id: TMF669
        gatewayConfiguration:
          apiKeyVerification: {{ .Values.component.apipolicy.apiKeyVerification | toYaml | nindent 12 }}
          rateLimit: {{ .Values.component.apipolicy.rateLimit | toYaml | nindent 12 }}
          quota: {{ .Values.component.apipolicy.quota | toYaml | nindent 12 }}
          OASValidation: {{ .Values.component.apipolicy.OASValidation | toYaml | nindent 12 }}
          CORS: {{ .Values.component.apipolicy.CORS | toYaml | nindent 12 }}
          template: {{ .Values.component.apipolicy.template | quote }}
        path: /{{ .Release.Name }}-{{ .Values.component.name }}/tmf-api/partyRoleManagement/v4
        developerUI: /{{ .Release.Name }}-{{ .Values.component.name }}/tmf-api/partyRoleManagement/v4/docs
        port: 8080
