apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-permissionsmanagementinitialization
  labels:
    oda.tmforum.org/componentName: {{ .Release.Name }}-{{ .Values.component.name }}
spec:
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-permissionsmanagementinitialization
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: {{ .Release.Name }}-permissionsmanagementinitialization
          image: {{ .Values.permissionsmanagementinitialization.image }}
          env:
            - name: RELEASE_NAME
              value: {{ .Release.Name }}
            - name: COMPONENT_NAME
              value: {{ .Release.Name }}-{{ .Values.component.name }}
            - name: PERMISSIONS_API_BASE_URL
              value: http://{{ .Release.Name }}-permissionsmanagementapi:8080/{{ .Release.Name }}-{{ .Values.component.name }}/tmf-api/rolesAndPermissions/{{ .Values.component.apiVersion }}
            - name: METRICS_CALLBACK_URL
              value: http://{{ .Release.Name }}-{{ .Values.component.name }}-sm:4000/listener/accessEvent
          imagePullPolicy: IfNotPresent
  backoffLimit: 10
