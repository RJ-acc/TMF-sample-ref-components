apiVersion: oda.tmforum.org/v1
kind: Component
metadata:
  name: r1-productordercapturevalidation
  labels:
    oda.tmforum.org/componentName: r1-productordercapturevalidation
spec:
  componentMetadata:
    id: TMFC002
    name: productordercapturevalidation
    functionalBlock: CoreCommerce
    publicationDate: "2026-03-14T00:00:00.000Z"
    status: specified
    version: "0.1.0"
    description: Reference TMFC002 Product Order Capture & Validation component with TMF622 order capture, internal validation, metrics, role support, and optional MCP.
