  versionLabel: open-metrics-0.2.0

mcp:
  image: ravijangra92/tmf638:mcp-server-0.2.2
  versionLabel: mcp-server-0.2.2

partyrole:
  image: ravijangra92/tmf638:party-role-0.2.0
  versionLabel: party-role-0.2.0

roleinitialization:
  image: ravijangra92/tmf638:role-init-0.2.0
  versionLabel: role-init-0.2.0

serviceinventoryinitialization:
